<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bb9af7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square with padding for dock size -->
  <rect x="128" y="128" width="768" height="768" rx="192" fill="url(#bgGrad)"/>

  <!-- Letter V -->
  <g filter="url(#shadow)">
    <!-- Left stroke of V -->
    <path d="M 280 320 L 480 720 L 512 720 L 352 320 Z" fill="white" opacity="0.95"/>
    <!-- Right stroke of V -->
    <path d="M 744 320 L 544 720 L 512 720 L 672 320 Z" fill="white" opacity="0.95"/>
  </g>

  <!-- Small accent dots representing data points -->
  <circle cx="320" cy="380" r="16" fill="white" opacity="0.6"/>
  <circle cx="704" cy="380" r="16" fill="white" opacity="0.6"/>
  <circle cx="512" cy="760" r="20" fill="white" opacity="0.8"/>
</svg>
