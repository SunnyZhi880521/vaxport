<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#grad)"/>
  <!-- DNA helix / vaccine symbol -->
  <g transform="translate(256, 256)" fill="none" stroke="white" stroke-width="24" stroke-linecap="round">
    <!-- Left strand -->
    <path d="M -80,-120 Q -80,-60 -40,0 Q 0,60 0,120"/>
    <!-- Right strand -->
    <path d="M 80,-120 Q 80,-60 40,0 Q 0,60 0,120"/>
    <!-- Connecting bars -->
    <line x1="-60" y1="-80" x2="60" y2="-80"/>
    <line x1="-40" y1="-40" x2="40" y2="-40"/>
    <line x1="-20" y1="0" x2="20" y2="0"/>
    <line x1="-40" y1="40" x2="40" y2="40"/>
    <line x1="-60" y1="80" x2="60" y2="80"/>
  </g>
  <!-- Data chart overlay -->
  <g transform="translate(128, 320)" fill="white" opacity="0.9">
    <rect x="0" y="40" width="20" height="60" rx="4"/>
    <rect x="30" y="20" width="20" height="80" rx="4"/>
    <rect x="60" y="0" width="20" height="100" rx="4"/>
    <rect x="90" y="30" width="20" height="70" rx="4"/>
    <rect x="120" y="10" width="20" height="90" rx="4"/>
  </g>
</svg>
